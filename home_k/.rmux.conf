# Github: https://github.com/Karmenzind/dotfiles-and-scripts
# Compatibility evidence and upgrade checklist: docs/windows-rmux.md

# RMUX is currently used only as the native Windows substitute for tmux.
# Preserve tmux key bindings and behavior wherever RMUX supports them, including
# prefix handling, pane/window creation, current-directory inheritance, copy
# mode, navigation, resizing, and synchronized panes.
#
# RMUX 0.8.0 differs enough from tmux that sourcing the full .tmux.conf is not
# reliable: plugins, shell jobs, conditionals, command aliases, and several
# terminal options are unsupported. Keep the small compatible baseline here.
set-option -g prefix C-a
bind-key C-a send-prefix
unbind-key C-b

set-option -g history-limit 5000
set-option -g automatic-rename off
set-option -g status-keys vi
set-option -g mode-keys vi
set-option -g mouse on
set-option -g escape-time 10
set-option -g repeat-time 600
set-option -g focus-events on
set-option -g base-index 0
set-option -g pane-base-index 0

set-option -g status-position bottom
set-option -g status-style bg=default,fg=cyan
set-option -g status-left "#{?selection_present, VISUAL , #S }"
set-option -g window-status-style fg=colour12
set-option -g window-status-current-style fg=white,bg=red,bold,underscore
set-option -g pane-border-status bottom
set-option -g pane-border-format "#{pane_index} #{pane_current_command}"
set-option -g pane-border-style fg=colour240
set-option -g pane-active-border-style fg=colour14,bold
# Match tmux's copy selection style. RMUX 0.8.0 parses this option but its
# native renderer does not yet paint the selection overlay; status-left above
# provides visible mode feedback until RMUX implements the overlay.
set-option -g mode-style bg=yellow,fg=black

bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R
bind-key -r C-h select-window -t :-
bind-key -r C-l select-window -t :+
bind-key -r H resize-pane -L 2
bind-key -r J resize-pane -D 2
bind-key -r K resize-pane -U 2
bind-key -r L resize-pane -R 2
bind-key C-s set-window-option synchronize-panes
bind-key R source-file "$USERPROFILE/.rmux.conf" \; display-message "RMUX config reloaded"

# RMUX 0.8.0 adds -NoProfile to its PowerShell host. Start the interactive
# pwsh as a child so it loads the normal PowerShell 7 profile, then close the
# host when the interactive shell exits.
set-option -g default-shell pwsh.exe
set-option -g default-command "pwsh.exe -NoLogo -NoExit -Command \"[Environment]::SetEnvironmentVariable('TERM','xterm-256color','Process')\"; exit"

# RMUX 0.8.0 exposes tmux-256color even on Windows systems without that
# terminfo entry. Its default-terminal and global TERM environment options are
# currently overwritten while creating a ConPTY, so each shell bootstrap below
# corrects TERM before starting the profile-loading pwsh child.
set-option -g update-environment "DISPLAY SSH_ASKPASS SSH_AUTH_SOCK SSH_AGENT_PID SSH_CONNECTION WINDOWID XAUTHORITY TERM_PROGRAM"

# RMUX 0.8.0 does not reliably pass an unbound Ctrl+D through to ConPTY.
# Catch it in the root table and send the raw 0x04 control byte to pwsh.
bind-key -n C-d send-keys -H 04

# RMUX 0.8.0 does not reliably apply default-command to new-window or
# split-window. Cover every normal keyboard route with an explicit interactive
# pwsh command so new windows and panes load the linked PowerShell profile.
bind c new-window -c "#{pane_current_path}" "pwsh.exe -NoLogo -NoExit -Command \"[Environment]::SetEnvironmentVariable('TERM','xterm-256color','Process')\"; exit"
bind '"' split-window -v -c "#{pane_current_path}" "pwsh.exe -NoLogo -NoExit -Command \"[Environment]::SetEnvironmentVariable('TERM','xterm-256color','Process')\"; exit"
bind % split-window -h -c "#{pane_current_path}" "pwsh.exe -NoLogo -NoExit -Command \"[Environment]::SetEnvironmentVariable('TERM','xterm-256color','Process')\"; exit"
bind _ split-window -v -c "#{pane_current_path}" "pwsh.exe -NoLogo -NoExit -Command \"[Environment]::SetEnvironmentVariable('TERM','xterm-256color','Process')\"; exit"
bind | split-window -h -c "#{pane_current_path}" "pwsh.exe -NoLogo -NoExit -Command \"[Environment]::SetEnvironmentVariable('TERM','xterm-256color','Process')\"; exit"
bind - split-window -v -c "#{pane_current_path}" "pwsh.exe -NoLogo -NoExit -Command \"[Environment]::SetEnvironmentVariable('TERM','xterm-256color','Process')\"; exit"
bind \\ split-window -h -c "#{pane_current_path}" "pwsh.exe -NoLogo -NoExit -Command \"[Environment]::SetEnvironmentVariable('TERM','xterm-256color','Process')\"; exit"

# RMUX does not currently recognize tmux's `send` command alias while parsing
# copy-mode bindings. Use the full command name so v enters a visible Vim-like
# selection instead of keeping RMUX's default rectangle-toggle binding.
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi V send-keys -X select-line
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection
