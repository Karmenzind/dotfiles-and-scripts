# Github: https://github.com/Karmenzind/dotfiles-and-scripts
# Compatibility evidence and upgrade checklist: docs/windows-rmux.md

# RMUX is currently used only as the native Windows substitute for tmux.
# Preserve tmux key bindings and behavior wherever RMUX supports them, including
# prefix handling, pane/window creation, current-directory inheritance, copy
# mode, navigation, resizing, and synchronized panes.
#
# Keep this file standalone: the shared tmux file contains Unix-only TPM
# plugins, shell jobs, clipboard commands, and terminal assumptions. RMUX 0.9
# parses substantially more tmux syntax, but those external commands are still
# not portable to native Windows.
set-option -g prefix C-a
bind-key C-a send-prefix
unbind-key C-b

set-option -g history-limit 5000
set-option -g automatic-rename off
set-option -g status-keys vi
set-option -g mode-keys vi
set-option -g mouse on
set-option -g escape-time 10
set-option -g repeat-time 600
set-option -g focus-events on
set-option -g base-index 0
set-option -g pane-base-index 0

set-option -g status-position bottom
set-option -g status-style bg=default,fg=cyan
set-option -g status-left "#{?selection_present, VISUAL , #S }"
set-option -g window-status-style fg=colour12
set-option -g window-status-current-style fg=white,bg=red,bold,underscore
set-option -g pane-border-status bottom
set-option -g pane-border-format "#{pane_index} #{pane_current_command}"
set-option -g pane-border-style fg=colour240
set-option -g pane-active-border-style fg=colour14,bold
# RMUX 0.9 renders the copy-mode selection with mode-style. Keep the VISUAL
# status marker as an additional mode indicator.
set-option -g mode-style bg=yellow,fg=black

bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R
bind-key -r C-h select-window -t :-
bind-key -r C-l select-window -t :+
bind-key -r H resize-pane -L 2
bind-key -r J resize-pane -D 2
bind-key -r K resize-pane -U 2
bind-key -r L resize-pane -R 2
bind-key C-s set-window-option synchronize-panes
bind-key R source-file "$USERPROFILE/.rmux.conf" \; display-message "RMUX config reloaded"

# RMUX 0.9 starts an interactive PowerShell directly and loads the normal
# profile. default-terminal is now applied consistently to ConPTY panes.
set-option -g default-shell pwsh.exe
set-option -g default-terminal xterm-256color
set-option -g update-environment "DISPLAY SSH_ASKPASS SSH_AUTH_SOCK SSH_AGENT_PID SSH_CONNECTION WINDOWID XAUTHORITY TERM_PROGRAM"

# Keep the 0.8 Ctrl+D workaround until physical-console input is verified on
# 0.9; send-keys exercises a different path and is not sufficient evidence.
bind-key -n C-d send-keys -H 04

# OSC 7 emitted by the PowerShell prompt keeps pane_current_path current; -c
# then makes new panes and windows inherit that directory.
bind c new-window -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind _ split-window -v -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind \\ split-window -h -c "#{pane_current_path}"

# RMUX 0.9.0 incorrectly gives begin-selection/select-line the last cached
# mouse position and moves the copy cursor there. selection-mode creates the
# same character/line selection at the current keyboard cursor without entering
# that mouse-specific dispatch path. Clear first so repeated v/V resets the
# anchor like begin-selection/select-line. Re-test after an RMUX upgrade.
bind-key -T copy-mode-vi v send -X clear-selection \; send -X selection-mode char
bind-key -T copy-mode-vi V send -X clear-selection \; send -X selection-mode line
bind-key -T copy-mode-vi C-v send -X rectangle-toggle
bind-key -T copy-mode-vi y send -X copy-selection
